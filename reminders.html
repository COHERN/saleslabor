<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reminders</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  :root {
    --blue:#00529F; --ltblue:#009FE0; --text:#231F20; --dim:#777777;
    --border:#E0E0E0; --red:#D6232A; --good:#1A6B32; --bg:#FFFFFF;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Share Tech Mono','Courier New',monospace; font-size:13px; line-height:1.5; }
  .screen { max-width:700px; margin:0 auto; }

  .header { background:var(--blue); color:#fff; padding:16px 20px; }
  .header-title { font-size:14px; font-weight:bold; letter-spacing:2px; }
  .header-sub { font-size:10px; color:rgba(255,255,255,0.7); margin-top:2px; letter-spacing:1px; }
  .nav { margin-top:10px; display:flex; gap:16px; flex-wrap:wrap; }
  .nav-link { color:#fff; text-decoration:none; font-size:11px; letter-spacing:1px; }
  .nav-link:hover { color:var(--ltblue); }
  .back { display:block; color:#fff; text-decoration:none; font-size:11px; margin-bottom:8px; }

  .body { padding:20px 20px 80px; }

  .tabs { display:flex; border-bottom:2px solid var(--border); margin-bottom:20px; }
  .tab { padding:8px 20px; font-size:11px; font-weight:bold; letter-spacing:2px; cursor:pointer; color:var(--dim); border-bottom:2px solid transparent; margin-bottom:-2px; }
  .tab.active { color:var(--blue); border-bottom-color:var(--blue); }

  .tab-content { display:none; }
  .tab-content.active { display:block; }

  .section-head { font-size:11px; font-weight:bold; letter-spacing:2px; color:var(--blue); border-bottom:1px solid var(--border); padding-bottom:6px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
  .reset-info { font-size:9px; color:var(--dim); font-weight:normal; letter-spacing:1px; }

  /* CHECKLIST */
  .checklist { margin-bottom:16px; }
  .check-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
  .check-item:last-child { border-bottom:none; }
  .check-item input[type=checkbox] { width:18px; height:18px; cursor:pointer; accent-color:var(--blue); flex-shrink:0; }
  .check-label { flex:1; font-size:12px; cursor:pointer; }
  .check-label.done { text-decoration:line-through; color:var(--dim); }
  .check-delete { color:var(--dim); font-size:10px; cursor:pointer; padding:2px 6px; border:1px solid transparent; background:transparent; font-family:'Share Tech Mono','Courier New',monospace; }
  .check-delete:hover { color:var(--red); border-color:var(--red); }

  .empty { color:var(--dim); font-size:11px; font-style:italic; padding:12px 0; }

  /* ADD ITEM */
  .add-row { display:flex; gap:8px; margin-top:12px; align-items:center; }
  .add-input { flex:1; background:transparent; border:none; border-bottom:1px solid var(--dim); font-family:'Share Tech Mono','Courier New',monospace; font-size:12px; color:var(--text); padding:4px 2px; outline:none; }
  .add-input:focus { border-bottom-color:var(--ltblue); }
  .add-btn { padding:6px 14px; border:none; background:var(--blue); color:#fff; font-family:'Share Tech Mono','Courier New',monospace; font-size:11px; cursor:pointer; letter-spacing:1px; white-space:nowrap; }
  .add-btn:hover { background:var(--ltblue); }

  /* PROGRESS */
  .progress { font-size:10px; color:var(--dim); margin-bottom:12px; letter-spacing:1px; }
  .progress span { font-weight:bold; color:var(--blue); }
  .progress.done span { color:var(--good); }

  .footer { color:var(--dim); font-size:10px; text-align:center; margin-top:28px; padding-top:12px; border-top:1px solid var(--border); }
</style>
</head>
<body>
<div class="screen">
  <div class="header">
    <a class="back" href="index.html">< HOME</a>
    <div class="header-title">REMINDERS</div>
    <div class="header-sub">DAILY & WEEKLY CHECKLIST</div>
    <div class="nav">
      <a class="nav-link" href="pl-tracker.html">P&amp;L</a>
      <a class="nav-link" href="daily.html">DAILY</a>
      <a class="nav-link" href="notes.html">NOTES</a>
      <a class="nav-link" href="glossary.html">GLOSSARY</a>
      <a class="nav-link" href="reminders.html">REMINDERS</a>
    </div>
  </div>

  <div class="body">

    <div class="tabs">
      <div class="tab active" onclick="switchTab('daily')">DAILY</div>
      <div class="tab" onclick="switchTab('weekly')">WEEKLY</div>
    </div>

    <!-- DAILY TAB -->
    <div class="tab-content active" id="tab-daily">
      <div class="section-head">
        <span>TODAY'S CHECKLIST</span>
        <span class="reset-info">RESETS DAILY</span>
      </div>
      <div class="progress" id="daily-progress"></div>
      <div class="checklist" id="daily-list"></div>
      <div class="add-row">
        <input class="add-input" id="daily-add-input" placeholder="Add daily reminder..." onkeydown="if(event.key==='Enter')addItem('daily')">
        <button class="add-btn" onclick="addItem('daily')">+ ADD</button>
      </div>
    </div>

    <!-- WEEKLY TAB -->
    <div class="tab-content" id="tab-weekly">
      <div class="section-head">
        <span>THIS WEEK'S CHECKLIST</span>
        <span class="reset-info">RESETS MONDAYS</span>
      </div>
      <div class="progress" id="weekly-progress"></div>
      <div class="checklist" id="weekly-list"></div>
      <div class="add-row">
        <input class="add-input" id="weekly-add-input" placeholder="Add weekly reminder..." onkeydown="if(event.key==='Enter')addItem('weekly')">
        <button class="add-btn" onclick="addItem('weekly')">+ ADD</button>
      </div>
    </div>

    <div class="footer">Checks reset automatically. Items saved to browser.</div>
  </div>
</div>

<script>
  var DEFAULT_DAILY = [
    'Food safety walk submitted',
    'Spotlight 1pm complete',
    'Spotlight 5pm complete',
    'Pi changes approved'
  ];

  var DEFAULT_WEEKLY = [
    'Starbucks walk',
    'Thursday — OOD rotations due',
    'Tuesday — Schedules completed'
  ];

  function getToday() {
    return new Date().toISOString().split('T')[0];
  }

  function getMonday() {
    var d = new Date();
    var day = d.getDay();
    var diff = d.getDate() - day + (day === 0 ? -6 : 1);
    var mon = new Date(d.setDate(diff));
    return mon.toISOString().split('T')[0];
  }

  function loadData(type) {
    var raw = localStorage.getItem('reminders_' + type);
    var data = raw ? JSON.parse(raw) : null;
    var resetKey = type === 'daily' ? getToday() : getMonday();

    if (!data || data.resetKey !== resetKey) {
      // Reset checks but keep items
      var items = data ? data.items : (type === 'daily' ? DEFAULT_DAILY : DEFAULT_WEEKLY).map(function(t) { return { id: Date.now() + Math.random(), text: t }; });
      data = { resetKey: resetKey, items: items, checked: {} };
      saveData(type, data);
    }
    return data;
  }

  function saveData(type, data) {
    localStorage.setItem('reminders_' + type, JSON.stringify(data));
  }

  function render(type) {
    var data = loadData(type);
    var listEl = document.getElementById(type + '-list');
    var progressEl = document.getElementById(type + '-progress');

    if (!data.items.length) {
      listEl.innerHTML = '<div class="empty">No reminders yet. Add one below.</div>';
      progressEl.innerHTML = '';
      return;
    }

    var checked = 0;
    var html = '';
    data.items.forEach(function(item) {
      var isDone = !!data.checked[item.id];
      if (isDone) checked++;
      html += '<div class="check-item">' +
        '<input type="checkbox" id="chk-' + item.id + '" ' + (isDone ? 'checked' : '') + ' onchange="toggleCheck(\'' + type + '\',' + item.id + ')">' +
        '<label class="check-label ' + (isDone ? 'done' : '') + '" for="chk-' + item.id + '">' + escHtml(item.text) + '</label>' +
        '<button class="check-delete" onclick="deleteItem(\'' + type + '\',' + item.id + ')">✕</button>' +
        '</div>';
    });

    listEl.innerHTML = html;

    var total = data.items.length;
    var allDone = checked === total;
    progressEl.className = 'progress' + (allDone ? ' done' : '');
    progressEl.innerHTML = '<span>' + checked + ' / ' + total + '</span> COMPLETED' + (allDone ? ' ✓' : '');
  }

  function toggleCheck(type, id) {
    var data = loadData(type);
    if (data.checked[id]) { delete data.checked[id]; }
    else { data.checked[id] = true; }
    saveData(type, data);
    render(type);
  }

  function addItem(type) {
    var input = document.getElementById(type + '-add-input');
    var text = input.value.trim();
    if (!text) return;
    var data = loadData(type);
    data.items.push({ id: Date.now(), text: text });
    saveData(type, data);
    input.value = '';
    render(type);
  }

  function deleteItem(type, id) {
    if (!confirm('Remove this reminder?')) return;
    var data = loadData(type);
    data.items = data.items.filter(function(i) { return i.id !== id; });
    delete data.checked[id];
    saveData(type, data);
    render(type);
  }

  function switchTab(type) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
    event.target.classList.add('active');
    document.getElementById('tab-' + type).classList.add('active');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  render('daily');
  render('weekly');
</script>
</body>
</html>
