<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Period Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #FFFFFF;
    --text: #231F20;
    --dim: #777777;
    --border: #E0E0E0;
    --blue: #00529F;
    --ltblue: #009FE0;
    --red: #D6232A;
    --good: #1A6B32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Share Tech Mono','Courier New',monospace; font-size: 13px; line-height: 1.5; }

  .screen { max-width: 700px; margin: 0 auto; padding: 0; }
  .header { background: var(--blue); color: #fff; padding: 16px 28px; }
  .header-title { font-size: 14px; font-weight: bold; letter-spacing: 2px; }
  .nav { margin-top: 10px; display: flex; gap: 16px; }
  .nav-link { color: #fff; text-decoration: none; font-size: 11px; letter-spacing: 1px; }
  .nav-link:hover { color: var(--ltblue); }

  .back { display: block; color: var(--dim); text-decoration: none; font-size: 12px; margin-bottom: 12px; letter-spacing: 1px; }
  .back:hover { color: var(--blue); }
  .back::before { content: '< '; }

  .body { padding: 20px 28px 80px; }

  .section { margin-bottom: 20px; }
  .section-head { font-size: 11px; font-weight: bold; letter-spacing: 2px; color: var(--blue); border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 10px; }

  .form-row { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; align-items: flex-end; }
  .form-field { display: flex; flex-direction: column; gap: 2px; }
  .form-label { color: var(--dim); font-size: 10px; letter-spacing: 1px; }
  .form-input, .form-select { background: transparent; border: none; border-bottom: 1px solid var(--dim); font-family: 'Share Tech Mono','Courier New',monospace; font-size: 12px; color: var(--text); padding: 2px 2px 3px; outline: none; }
  .form-input:focus, .form-select:focus { border-bottom-color: var(--ltblue); }
  .w-sm { width: 70px; }
  .w-md { width: 100px; }
  .w-lg { width: 140px; }

  .entry-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
  .entry-table th { text-align: left; padding: 6px 10px 4px 0; color: var(--dim); font-weight: normal; font-size: 10px; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
  .entry-table td { padding: 8px 10px 8px 0; border-bottom: 1px solid #eee; }
  .entry-table tr:last-child td { border-bottom: 1px solid var(--border); }

  .entry-date { font-weight: bold; color: var(--blue); width: 90px; }
  .entry-val { text-align: right; font-size: 11px; }
  .entry-var { text-align: right; font-weight: bold; font-size: 13px; }
  .entry-var.good { color: var(--good); }
  .entry-var.bad { color: var(--red); }

  .btn { padding: 8px 16px; border: none; background: var(--blue); color: #fff; font-family: 'Share Tech Mono','Courier New',monospace; font-size: 11px; cursor: pointer; letter-spacing: 1px; }
  .btn::before { content: '> '; }
  .btn:hover { background: var(--ltblue); }
  .btn.secondary { background: transparent; border: 1px solid var(--blue); color: var(--blue); }
  .btn.secondary:hover { background: var(--blue); color: #fff; }
  .btn.danger { color: var(--red); border-color: var(--red); }

  .empty { color: var(--dim); font-size: 12px; font-style: italic; padding: 20px 10px; text-align: center; }

  .entry-notes { color: var(--dim); font-size: 11px; padding: 4px 10px 8px 0; font-style: italic; }

  .footer { color: var(--dim); font-size: 10px; text-align: center; margin-top: 28px; padding-top: 12px; border-top: 1px solid var(--border); }

  @media print {
    body { font-size: 11px; }
    .screen { padding: 0; }
    .header { padding: 8px 14px; }
    .header-title { font-size: 12px; }
    .nav { display: none; }
    .back { display: none; }
    .body { padding: 10px 14px; }
    .section { margin-bottom: 12px; }
    .section:last-of-type { margin-bottom: 6px; }
    .section-head { font-size: 10px; margin-bottom: 6px; }
    .form-row, .form-field { display: none; }
    .entry-table { font-size: 10px; }
    .entry-table th { padding: 3px 6px 2px 0; font-size: 9px; }
    .entry-table td { padding: 4px 6px 4px 0; }
    .entry-var { font-size: 11px; }
    .btn { display: none; }
    .footer { display: block !important; margin: 6px 0 0 0; padding: 0; border: none; text-align: left; color: var(--text); font-size: 10px; font-weight: bold; }
    .footer::before { content: 'NOTES:'; display: block; margin-bottom: 4px; }
    .footer::after {
      content: '';
      display: block;
      border-bottom: 1px solid #ccc;
      margin: 2px 0;
      height: 14px;
    }
    .note-line { border-bottom: 1px solid #ccc; height: 14px; margin: 0; }
  }
</style>
</head>
<body>

<div class="screen">

  <div class="header">
    <a class="back" href="index.html" style="color:#fff;">HOME</a>
    <div class="header-title">PERIOD TRACKER</div>
    <div class="nav">
      <a class="nav-link" href="tracking.html">WEEKLY</a>
      <a class="nav-link" href="period.html">PERIOD</a>
    </div>
  </div>

  <div class="body">

    <!-- DEPT & PERIOD SELECTOR -->
    <div class="section">
      <div class="form-row">
        <div class="form-field">
          <label class="form-label">DEPARTMENT</label>
          <select class="form-select w-md" id="dept" onchange="switchDept()" style="font-size:13px;font-weight:bold;">
            <option value="grocery">GROCERY</option>
            <option value="meat">MEAT</option>
            <option value="seafood">SEAFOOD</option>
            <option value="produce">PRODUCE</option>
            <option value="deli">DELI</option>
            <option value="bakery">BAKERY</option>
            <option value="floral">FLORAL</option>
            <option value="starbucks">STARBUCKS</option>
            <option value="ecom">ECOM</option>
            <option value="frontend">FRONT END</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">PERIOD TYPE</label>
          <select class="form-select" id="period" onchange="switchPeriod()" style="width:100px;font-size:13px;font-weight:bold;">
            <option value="ptd">PTD</option>
            <option value="qtd">QTD</option>
          </select>
        </div>
      </div>
    </div>

    <!-- ENTRY FORM -->
    <div class="section">
      <div class="section-head">NEW ENTRY</div>

      <div class="form-row">
        <div class="form-field">
          <label class="form-label">SALES ID</label>
          <input class="form-input w-md" id="entry-salesid" placeholder="ID">
        </div>
        <div class="form-field">
          <label class="form-label">DATE</label>
          <input class="form-input" id="entry-date" type="date">
        </div>
      </div>

      <div style="border-top:1px solid var(--border);padding-top:10px;margin-bottom:10px;">
        <div style="font-size:11px;color:var(--blue);font-weight:bold;margin-bottom:8px;">CURRENT YEAR SALES</div>
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">PROJ</label>
            <input class="form-input w-md" id="entry-cy-proj" placeholder="$0">
          </div>
          <div class="form-field">
            <label class="form-label">ACT</label>
            <input class="form-input w-md" id="entry-cy-act" placeholder="$0">
          </div>
        </div>
      </div>

      <div style="border-top:1px solid var(--border);padding-top:10px;margin-bottom:10px;">
        <div style="font-size:11px;color:var(--blue);font-weight:bold;margin-bottom:8px;">PRIOR YEAR SALES</div>
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">PY ACTUAL</label>
            <input class="form-input w-md" id="entry-py-act" placeholder="$0">
          </div>
        </div>
      </div>

      <div style="border-top:1px solid var(--border);padding-top:10px;">
        <div style="font-size:11px;color:var(--blue);font-weight:bold;margin-bottom:8px;">OTHER METRICS</div>
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">SHRINK PROJ %</label>
            <input class="form-input w-sm" id="entry-shrink-proj" placeholder="0.00">
          </div>
          <div class="form-field">
            <label class="form-label">SHRINK ACT %</label>
            <input class="form-input w-sm" id="entry-shrink-act" placeholder="0.00">
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label class="form-label">GROSS PROJ %</label>
            <input class="form-input w-sm" id="entry-gross-proj" placeholder="0.00">
          </div>
          <div class="form-field">
            <label class="form-label">GROSS ACT %</label>
            <input class="form-input w-sm" id="entry-gross-act" placeholder="0.00">
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label class="form-label">GAIN PROJ %</label>
            <input class="form-input w-sm" id="entry-gain-proj" placeholder="0.00">
          </div>
          <div class="form-field">
            <label class="form-label">GAIN ACT %</label>
            <input class="form-input w-sm" id="entry-gain-act" placeholder="0.00">
          </div>
        </div>
      </div>

      <button class="btn" onclick="addEntry()" style="margin-top:12px;">SAVE</button>
      <button class="btn secondary" onclick="clearForm()" style="margin-left:8px;">CLEAR</button>
    </div>

    <!-- HISTORY -->
    <div class="section">
      <div class="section-head">HISTORY</div>
      <div id="history-container">
        <div class="empty">No entries for this department yet.</div>
      </div>
      <button class="btn secondary danger" onclick="deleteAllEntries()" style="margin-top:12px;">DELETE ALL FOR THIS DEPT</button>
      <button class="btn secondary" onclick="printPDF()" style="margin-left:8px;">PRINT / PDF</button>
    </div>

    <div class="footer">Data saved to browser per department.</div>

  </div>

</div>

<script>
  function parseNum(str) {
    return parseFloat((str||'').replace(/[$,%\s]/g,'')) || 0;
  }

  function fmt$(n) {
    var abs = Math.abs(n);
    return (n < 0 ? '-' : '+') + '$' + abs.toLocaleString('en-US',{maximumFractionDigits:0});
  }

  function fmtPts(n) {
    return (n >= 0 ? '+' : '') + n.toFixed(2) + ' pts';
  }

  function getDept() {
    return document.getElementById('dept').value;
  }

  function getPeriod() {
    return document.getElementById('period').value;
  }

  function getKey(dept, period) {
    return 'period_' + dept + '_' + period;
  }

  function switchDept() {
    clearForm();
    render();
  }

  function switchPeriod() {
    clearForm();
    render();
  }

  function addEntry() {
    var dept = getDept();
    var period = getPeriod();
    var date = document.getElementById('entry-date').value;
    var salesid = document.getElementById('entry-salesid').value.trim();
    
    if (!date || !salesid) {
      alert('Sales ID and Date required');
      return;
    }

    var entry = {
      id: Date.now(),
      salesid: salesid,
      date: date,
      cy_proj: parseNum(document.getElementById('entry-cy-proj').value),
      cy_act: parseNum(document.getElementById('entry-cy-act').value),
      py_act: parseNum(document.getElementById('entry-py-act').value),
      shrink_proj: parseNum(document.getElementById('entry-shrink-proj').value),
      shrink_act: parseNum(document.getElementById('entry-shrink-act').value),
      gross_proj: parseNum(document.getElementById('entry-gross-proj').value),
      gross_act: parseNum(document.getElementById('entry-gross-act').value),
      gain_proj: parseNum(document.getElementById('entry-gain-proj').value),
      gain_act: parseNum(document.getElementById('entry-gain-act').value),
    };

    var key = getKey(dept, period);
    var entries = JSON.parse(localStorage.getItem(key) || '[]');
    entries.unshift(entry);
    localStorage.setItem(key, JSON.stringify(entries));

    clearForm();
    render();
  }

  function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    var dept = getDept();
    var period = getPeriod();
    var key = getKey(dept, period);
    var entries = JSON.parse(localStorage.getItem(key) || '[]');
    entries = entries.filter(function(e) { return e.id !== id; });
    localStorage.setItem(key, JSON.stringify(entries));
    render();
  }

  function deleteAllEntries() {
    if (!confirm('Delete ALL entries for this department?')) return;
    var dept = getDept();
    var period = getPeriod();
    var key = getKey(dept, period);
    localStorage.removeItem(key);
    render();
  }

  function clearForm() {
    document.getElementById('entry-salesid').value = '';
    document.getElementById('entry-date').value = '';
    document.getElementById('entry-cy-proj').value = '';
    document.getElementById('entry-cy-act').value = '';
    document.getElementById('entry-py-act').value = '';
    document.getElementById('entry-shrink-proj').value = '';
    document.getElementById('entry-shrink-act').value = '';
    document.getElementById('entry-gross-proj').value = '';
    document.getElementById('entry-gross-act').value = '';
    document.getElementById('entry-gain-proj').value = '';
    document.getElementById('entry-gain-act').value = '';
  }

  function render() {
    var dept = getDept();
    var period = getPeriod();
    var key = getKey(dept, period);
    var entries = JSON.parse(localStorage.getItem(key) || '[]');
    var container = document.getElementById('history-container');

    if (entries.length === 0) {
      container.innerHTML = '<div class="empty">No entries for this department yet.</div>';
      return;
    }

    var html = '<table class="entry-table"><thead><tr><th>DATE</th><th class="entry-val">CY SALES</th><th class="entry-val">YoY</th><th class="entry-val">SHRINK</th><th class="entry-val">GROSS</th><th class="entry-val">GAIN</th><th></th></tr></thead><tbody>';

    entries.forEach(function(e) {
      var date = new Date(e.date + 'T00:00:00');
      var dateStr = (date.getMonth()+1).toString().padStart(2,'0') + '/' + date.getDate().toString().padStart(2,'0');

      var cy_var = e.cy_act - e.cy_proj;
      var cy_good = cy_var >= 0;
      var cy_str = fmt$(cy_var);

      var yoy_var = e.cy_act - e.py_act;
      var yoy_good = yoy_var >= 0;
      var yoy_str = fmt$(yoy_var);

      var shrink_var = e.shrink_act - e.shrink_proj;
      var shrink_good = shrink_var <= 0;
      var shrink_str = fmtPts(shrink_var);

      var gross_var = e.gross_act - e.gross_proj;
      var gross_good = gross_var >= 0;
      var gross_str = fmtPts(gross_var);

      var gain_var = e.gain_act - e.gain_proj;
      var gain_good = gain_var >= 0;
      var gain_str = fmtPts(gain_var);

      html += '<tr>' +
        '<td class="entry-date">' + dateStr + '<br><span style="color:var(--dim);font-size:10px;">' + e.salesid + '</span></td>' +
        '<td class="entry-var ' + (cy_good ? 'good' : 'bad') + '">' + cy_str + '</td>' +
        '<td class="entry-var ' + (yoy_good ? 'good' : 'bad') + '">' + yoy_str + '</td>' +
        '<td class="entry-var ' + (shrink_good ? 'good' : 'bad') + '">' + shrink_str + '</td>' +
        '<td class="entry-var ' + (gross_good ? 'good' : 'bad') + '">' + gross_str + '</td>' +
        '<td class="entry-var ' + (gain_good ? 'good' : 'bad') + '">' + gain_str + '</td>' +
        '<td><button class="btn secondary danger" onclick="deleteEntry(' + e.id + ')" style="padding:4px 10px;font-size:10px;">X</button></td>' +
        '</tr>';
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function printPDF() {
    var dept = getDept().toUpperCase();
    var period = getPeriod().toUpperCase();
    document.title = 'Period_Tracker_' + period + '_' + dept;
    window.print();
  }

  render();
</script>
</body>
</html>
